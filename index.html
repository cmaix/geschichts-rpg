<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronik-Engine · Geschichts-RPG (Abitur · Dalton)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { scroll-behavior: smooth; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .font-term { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace; }
  .stat-bar { transition: width 0.7s cubic-bezier(.22,.61,.36,1), background-color 0.4s ease; }
  .fade-in { animation: fadeIn 0.45s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .log-in { animation: logIn 0.4s ease both; }
  @keyframes logIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
  /* kritisches Blinken des Verdachtswerts */
  .blink-critical { animation: blink 1.1s steps(2, start) infinite; }
  @keyframes blink { 50% { opacity: 0.35; } }
  .crisis-box { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.35);} 50% { box-shadow: 0 0 14px 2px rgba(239,68,68,0.45);} }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 6px; }
</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased">

<div class="max-w-6xl mx-auto px-4 py-6">

  <!-- ================= MENÜ / ROLLENWAHL ================= -->
  <section id="menu" class="fade-in"></section>

  <!-- ================= SPIEL (3 Spalten) ================= -->
  <section id="game" class="hidden">
    <!-- Kopf -->
    <div class="flex items-center justify-between gap-3 mb-5">
      <div class="min-w-0">
        <p id="hud-epoch" class="text-sm font-bold text-amber-400 truncate">—</p>
        <p id="hud-role" class="text-xs text-slate-500 truncate">—</p>
      </div>
      <button onclick="goHome()" class="shrink-0 text-xs px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all">⟵ Aufgeben / Menü</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-start">
      <!-- LINKS: Charakter & Inventar -->
      <aside class="md:col-span-3 md:sticky md:top-4 space-y-4">
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-4">
          <p class="text-[11px] font-semibold uppercase tracking-widest text-slate-400 mb-3">Charakter</p>
          <p id="char-name" class="font-bold text-amber-300 leading-snug mb-3">—</p>
          <div id="char-stats" class="space-y-3"></div>
          <div id="char-warning" class="hidden mt-3"></div>
        </div>
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-4">
          <p class="text-[11px] font-semibold uppercase tracking-widest text-slate-400 mb-3">📜 Inventar (Quellen)</p>
          <div id="inventory" class="space-y-2"></div>
        </div>
      </aside>

      <!-- MITTE: Text-Log -->
      <main class="md:col-span-6">
        <div class="bg-slate-950 border border-amber-800/40 rounded-2xl p-1 shadow-xl shadow-black/40">
          <div class="flex items-center gap-2 px-4 py-2 border-b border-slate-800">
            <span class="h-2.5 w-2.5 rounded-full bg-rose-500/70"></span>
            <span class="h-2.5 w-2.5 rounded-full bg-amber-500/70"></span>
            <span class="h-2.5 w-2.5 rounded-full bg-emerald-500/70"></span>
            <span class="ml-2 text-[11px] font-term text-slate-500">chronik://welt_1789</span>
          </div>
          <div id="log" class="font-term text-sm leading-relaxed p-4 h-[58vh] md:h-[66vh] overflow-y-auto space-y-3"></div>
        </div>
      </main>

      <!-- RECHTS: Aktionen & Navigation -->
      <aside class="md:col-span-3 space-y-4">
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-4">
          <p id="action-title" class="text-[11px] font-semibold uppercase tracking-widest text-slate-400 mb-3">Aktionen</p>
          <div id="actions" class="space-y-2"></div>
        </div>
      </aside>
    </div>
  </section>

  <!-- ================= AUSWERTUNG / GAME OVER ================= -->
  <section id="overlay" class="hidden"></section>

</div>

/* =========================================================================
   ZUSTAND
   ========================================================================= */
const state = {
  activeModuleIndex: null,
  currentCharacter: null,     // Rollen-Objekt
  currentLocation: "start",
  inventory: [],
  stats: { influence: 50, suspicion: 10 },
  log: [],                    // {type, text}
  decisions: [],              // {location, npc, choice} – Protokoll für Zertifikat
  dialogNpcIndex: null,       // aktiver NPC-Dialog (Index im sichtbaren NPC-Array) oder null
  gameOver: false,
  phase: "menu",              // menu | playing | evaluation | gameover
  pendingModuleIndex: null    // im Menü gewählte Welt (vor Rollenwahl)
};

const SAVE_KEY = "geschichts_rpg_state";
const MIN = 0, MAX = 100;
const clamp = v => Math.max(MIN, Math.min(MAX, v));
const mod = () => MODULES[state.activeModuleIndex];
const loc = () => mod().locations[state.currentLocation];

/* =========================================================================
   HELPER
   ========================================================================= */
function findArtifact(id) {
  for (const m of MODULES)
    for (const key in m.locations)
      for (const a of (m.locations[key].artifacts || []))
        if (a.id === id) return a;
  return null;
}
// nur die zur Rolle passenden NPCs eines Raums
function visibleNpcs(location) {
  return (location.npcs || []).filter(n => !n.identity_for_role || n.identity_for_role === state.currentCharacter.id);
}
function pushLog(type, text) { state.log.push({ type, text }); }

/* =========================================================================
   PERSISTENZ (localStorage)
   ========================================================================= */
function save() {
  if (state.activeModuleIndex === null || !state.currentCharacter) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      activeModuleIndex: state.activeModuleIndex,
      currentCharacter: state.currentCharacter,
      currentLocation: state.currentLocation,
      inventory: state.inventory,
      stats: state.stats,
      log: state.log,
      decisions: state.decisions,
      gameOver: state.gameOver,
      phase: state.phase
    }));
  } catch (e) { /* localStorage evtl. blockiert – Spiel läuft trotzdem */ }
}
function hasSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (o && o.currentCharacter && o.activeModuleIndex != null && MODULES[o.activeModuleIndex]) return o;
    return null;
  } catch (e) { return null; }
}
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function clearSaveAndRefresh() { clearSave(); renderMenu(); }

function resume() {
  const s = hasSave();
  if (!s) return;
  state.activeModuleIndex = s.activeModuleIndex;
  state.currentCharacter = s.currentCharacter;
  state.currentLocation = s.currentLocation;
  state.inventory = s.inventory || [];
  state.stats = s.stats || { influence: 50, suspicion: 10 };
  state.log = s.log || [];
  state.decisions = s.decisions || [];
  state.dialogNpcIndex = null;
  state.gameOver = !!s.gameOver;
  state.phase = s.phase || 'playing';
  if (state.phase === 'gameover') showGameOver();
  else if (state.phase === 'evaluation') showEvaluation();
  else showGameView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Spielansicht (3 Spalten) einblenden und rendern */
function showGameView() {
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  const m = mod();
  document.getElementById('hud-epoch').textContent = m.epoch;
  document.getElementById('hud-role').textContent = "Rolle: " + state.currentCharacter.name;
  render();
}

/* =========================================================================
   WELT GEWÄHLT → ROLLENWAHL
   ========================================================================= */
function selectModule(idx) {
  state.pendingModuleIndex = idx;
  const m = MODULES[idx];
  document.getElementById('menu').innerHTML = `
    <div class="mb-6">
      <button onclick="renderMenu()" class="text-xs px-3 py-1.5 rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-all">⟵ Welten</button>

    <div class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-6 mb-6">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <button onclick="selectRole(${idx}, '${r.id}')"
          class="group text-left bg-slate-800/70 hover:bg-slate-800 border border-slate-700 hover:border-amber-500/60 rounded-2xl p-5 transition-all duration-200 hover:-translate-y-1 hover:shadow-xl hover:shadow-black/40 focus:outline-none focus:ring-2 focus:ring-amber-500">
          <h3 class="font-bold text-slate-100 leading-snug group-hover:text-amber-400 transition-colors">${r.name}</h3>
          <p class="mt-2 text-sm text-slate-400 leading-relaxed">${r.desc}</p>
          <div class="mt-4 flex gap-4 text-xs font-term">
            <span class="text-emerald-400">🎯 Start-Einfluss ${r.start.influence}</span>
            <span class="text-rose-400">🕵️ Start-Risiko ${r.start.suspicion}</span>
          </div>
          <span class="inline-block mt-4 text-sm font-medium text-amber-500/90 group-hover:translate-x-1 transition-transform">Rolle spielen →</span>
        </button>`).join('')}
    </div>`;

}

/* =========================================================================
   ROLLE WÄHLEN / SPIEL STARTEN
   ========================================================================= */
function selectRole(moduleIdx, roleId) {
  state.activeModuleIndex = moduleIdx;
  const m = mod();
  const role = m.roles.find(r => r.id === roleId);
  state.currentCharacter = role;
  state.stats = { influence: role.start.influence, suspicion: role.start.suspicion };
  state.inventory = [];
  state.log = [];
  state.decisions = [];
  state.dialogNpcIndex = null;
  state.gameOver = false;
  state.phase = 'playing';
  state.currentLocation = m.startLocation;

  pushLog('system', `Du erwachst in deiner Rolle als ${role.name}.`);
  enterRoomLog();
  showGameView();
  save();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =========================================================================
   RAUMWECHSEL
   ========================================================================= */
function enterRoomLog() {
  const l = loc();
  pushLog('room-title', l.name);
  pushLog('room', l.description);
}

function changeLocation(locId) {
  if (locId === 'end_evaluation') { showEvaluation(); return; }
  state.currentLocation = locId;
  state.dialogNpcIndex = null;
  enterRoomLog();
  render();
  save();
}

/* =========================================================================
   ARTEFAKT AUFHEBEN
   ========================================================================= */
function pickUpItem(itemId) {
  if (state.inventory.includes(itemId)) return;
  const art = findArtifact(itemId);
  state.inventory.push(itemId);
  pushLog('source-title', `Aufgenommen: ${art.name}`);
  pushLog('source', art.text);
  if (art.hint) pushLog('hint', "💡 " + art.hint);
  state.dialogNpcIndex = null;
  render();
  save();
}

function inspectItem(itemId) {
  const art = findArtifact(itemId);
  pushLog('source-title', `Erneut gelesen: ${art.name}`);
  pushLog('source', art.text);
  render();
}

/* =========================================================================
   NPC-INTERAKTION
   ========================================================================= */
function interactWithNPC(npcIndex) {
  state.dialogNpcIndex = npcIndex;
  const npc = visibleNpcs(loc())[npcIndex];
  pushLog('npc-name', npc.name);
  pushLog('npc', npc.dialog_start);
  render();
  save();
}

function chooseDialog(npcIndex, choiceIndex) {
  const npc = visibleNpcs(loc())[npcIndex];
  const choice = npc.choices[choiceIndex];
  // Gating-Sicherung
  if (choice.requires_item && !state.inventory.includes(choice.requires_item)) return;

  // Spielerentscheidung protokollieren + Effekte
  pushLog('choice', "➤ " + choice.text);
  state.decisions.push({ location: loc().name, npc: npc.name, choice: choice.text });
  applyEffects(choice.effects);
  pushLog('feedback', choice.feedback);

  state.dialogNpcIndex = null;
  save();

  // Game Over hat Vorrang vor jedem Ortswechsel
  if (checkGameOver()) { render(); return; }

  render();
  if (choice.next_location && choice.next_location !== state.currentLocation) {
    changeLocation(choice.next_location);
  } else {
    render();
  }
}

function applyEffects(effects) {
  if (!effects) return;
  state.stats.influence = clamp(state.stats.influence + (effects.influence || 0));
  state.stats.suspicion = clamp(state.stats.suspicion + (effects.suspicion || 0));
}

/* =========================================================================
   GAME OVER PRÜFUNG
   ========================================================================= */
function checkGameOver() {
  if (state.stats.suspicion >= 80) {
    state.gameOver = true;
    showGameOver();
    return true;
  }
  return false;
}

/* =========================================================================
   RENDERING
   ========================================================================= */
function render() {
  renderSidebar();
  renderLog();
  renderActions();
}

function statBlock(key) {
  const m = mod();
  const val = state.stats[key];
  const label = m.statLabels[key];
  let barColor, valClass = "text-slate-200";
  if (key === 'influence') {
    barColor = val < 20 ? 'bg-rose-500' : 'bg-emerald-500';
    if (val < 20) valClass = "text-rose-400";
  } else { // suspicion
    if (val >= 50) { barColor = 'bg-rose-500'; valClass = "text-rose-400 blink-critical"; }
    else if (val >= 30) { barColor = 'bg-amber-500'; valClass = "text-amber-400"; }
    else { barColor = 'bg-sky-500'; }
  }
  return `
    <div>
      <div class="flex justify-between items-center mb-1">
        <span class="text-xs font-medium text-slate-300">${label}</span>
        <span class="text-xs font-bold font-term tabular-nums ${valClass}">${val}%</span>
      </div>
      <div class="h-2.5 w-full bg-slate-700/70 rounded-full overflow-hidden">
        <div class="stat-bar h-full rounded-full ${barColor}" style="width:${val}%"></div>
      </div>
    </div>`;
}

function renderSidebar() {
  document.getElementById('char-name').textContent = state.currentCharacter.name;
  document.getElementById('char-stats').innerHTML = statBlock('influence') + statBlock('suspicion');

  // Warnsystem
  const warn = document.getElementById('char-warning');
  let html = '';
  if (state.stats.suspicion >= 50)
    html += `<div class="text-[11px] font-medium text-rose-300 bg-rose-500/10 border border-rose-500/40 rounded-lg px-3 py-2 crisis-box">⚠️ Höchste Gefahr! Bei Verdacht ≥ 80% droht Inhaftierung.</div>`;
  if (state.stats.influence === 0)
    html += `<div class="mt-2 text-[11px] font-medium text-amber-300 bg-amber-500/10 border border-amber-500/40 rounded-lg px-3 py-2">📉 Politische Bedeutungslosigkeit – niemand hört dir mehr zu.</div>`;
  warn.innerHTML = html;
  warn.classList.toggle('hidden', html === '');

  // Inventar
  const inv = document.getElementById('inventory');
  if (state.inventory.length === 0) {
    inv.innerHTML = `<p class="text-xs text-slate-600 italic">Noch keine Quellen gesammelt.</p>`;
  } else {
    inv.innerHTML = state.inventory.map(id => {
      const a = findArtifact(id);
      return `<button onclick="inspectItem('${id}')" title="Erneut lesen"
        class="w-full text-left text-xs bg-slate-900/70 hover:bg-slate-900 border border-amber-800/40 rounded-lg px-3 py-2 text-amber-200/90 transition-all">
        ${a.name}</button>`;
    }).join('');
  }
}

function renderLog() {
  const styleMap = {
    'system':       'text-slate-500 italic',
    'room-title':   'text-amber-400 font-bold',
    'room':         'text-slate-300',
    'source-title': 'text-amber-300 font-semibold',
    'source':       'text-amber-100/90 border-l-2 border-amber-700/60 pl-3 italic',
    'hint':         'text-sky-400 text-xs',
    'npc-name':     'text-emerald-400 font-semibold',
    'npc':          'text-emerald-100/90',
    'choice':       'text-slate-100 font-medium',
    'feedback':     'text-slate-300 bg-slate-800/60 border border-slate-700/60 rounded-lg px-3 py-2'
  };
  const box = document.getElementById('log');
  box.innerHTML = state.log.map(e =>
    `<p class="log-in ${styleMap[e.type] || 'text-slate-300'}">${e.text}</p>`).join('');
  box.scrollTop = box.scrollHeight;
}

function renderActions() {
  const title = document.getElementById('action-title');
  const box = document.getElementById('actions');
  const l = loc();
  const npcs = visibleNpcs(l);

  // --- DIALOG-MODUS ---
  if (state.dialogNpcIndex !== null) {
    const npc = npcs[state.dialogNpcIndex];
    title.textContent = "💬 " + npc.name;
    let html = npc.choices.map((c, i) => {
      const locked = c.requires_item && !state.inventory.includes(c.requires_item);
      if (locked) {
        const art = findArtifact(c.requires_item);
        return `<button disabled
          class="w-full text-left text-sm bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3 text-slate-500 cursor-not-allowed">
          <span class="block">${c.text}</span>
          <span class="mt-2 inline-block text-[11px] text-rose-400/80">🔒 Benötigt: ${art ? art.name : c.requires_item}</span>
        </button>`;
      }
      const isSource = !!c.requires_item;
      return `<button onclick="chooseDialog(${state.dialogNpcIndex}, ${i})"
        class="w-full text-left text-sm bg-slate-800/70 hover:bg-slate-800 border ${isSource ? 'border-amber-500/50 hover:border-amber-400' : 'border-slate-700 hover:border-slate-500'} rounded-xl px-4 py-3 transition-all hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-amber-500">
        ${isSource ? '<span class="block text-[10px] font-bold uppercase tracking-wider text-amber-400 mb-1">📜 Quellengestützt</span>' : ''}
        <span class="block text-slate-100">${c.text}</span>
      </button>`;
    }).join('');
    html += `<button onclick="endDialog()" class="w-full text-center text-xs mt-1 px-3 py-2 rounded-lg bg-slate-900/70 hover:bg-slate-900 border border-slate-700 text-slate-400 transition-all">↩︎ Gespräch zurückstellen</button>`;
    box.innerHTML = html;
    return;
  }

  // --- NORMAL-MODUS ---
  title.textContent = "Aktionen";
  let html = '';

  // Artefakte aufheben
  const openArtifacts = (l.artifacts || []).filter(a => !state.inventory.includes(a.id));
  if (openArtifacts.length) {
    html += `<p class="text-[10px] uppercase tracking-widest text-slate-500 font-term">Quellen untersuchen</p>`;
    html += openArtifacts.map(a => `
      <button onclick="pickUpItem('${a.id}')"
        class="w-full text-left text-sm bg-slate-800/70 hover:bg-slate-800 border border-amber-800/50 hover:border-amber-500/70 rounded-xl px-4 py-3 transition-all hover:-translate-y-0.5">
        🔍 ${a.name}<span class="block text-[11px] text-slate-500 mt-0.5">aufheben &amp; lesen</span>
      </button>`).join('');
  }

  // NPCs ansprechen
  if (npcs.length) {
    html += `<p class="text-[10px] uppercase tracking-widest text-slate-500 font-term pt-2">Personen ansprechen</p>`;
    html += npcs.map((n, i) => `
      <button onclick="interactWithNPC(${i})"
        class="w-full text-left text-sm bg-slate-800/70 hover:bg-slate-800 border border-emerald-700/50 hover:border-emerald-500/70 rounded-xl px-4 py-3 transition-all hover:-translate-y-0.5">
        💬 ${n.name}
      </button>`).join('');
  }

  // Ausgänge
  if ((l.exits || []).length) {
    html += `<p class="text-[10px] uppercase tracking-widest text-slate-500 font-term pt-2">Orte wechseln</p>`;
    html += l.exits.map(ex => {
      const target = mod().locations[ex];
      return `<button onclick="changeLocation('${ex}')"
        class="w-full text-left text-sm bg-slate-800/70 hover:bg-slate-800 border border-slate-700 hover:border-sky-500/60 rounded-xl px-4 py-3 transition-all hover:-translate-y-0.5">
        🚪 ${target ? target.name.replace('📍 ', '') : ex}
      </button>`;
    }).join('');
  }

  box.innerHTML = html || `<p class="text-xs text-slate-600 italic">Keine Aktionen verfügbar.</p>`;
}

function endDialog() { state.dialogNpcIndex = null; render(); }

/* =========================================================================
   AUSWERTUNG (Quest erfolgreich)
   ========================================================================= */

    ? state.decisions.map((d, i) => `${i + 1}. [${d.location.replace('📍 ', '')}] ${d.npc}\n   → ${d.choice}`).join('\n')
    : '(keine Entscheidungen protokolliert)';

  const copyText =
`DALTON-MAPPE – ${m.epoch}
Rolle: ${state.currentCharacter.name}

GETROFFENE ENTSCHEIDUNGEN:
${decisionsTxt}

GESAMMELTE QUELLEN-ARTEFAKTE:
${state.inventory.length ? state.inventory.map(id => '- ' + findArtifact(id).name).join('\n') : '- (keine)'}

ENDWERTE: ${m.statLabels.influence} = ${state.stats.influence}% | ${m.statLabels.suspicion} = ${state.stats.suspicion}%

ABITUR-WISSEN:
${ev.summary}

REFLEXIONSAUFGABE:
${ev.daltonTask}`;

  ov.innerHTML = `
    <div class="fade-in max-w-3xl mx-auto">
      <div class="text-center mb-8">
        <div class="text-5xl mb-3">🏆</div>
        <h2 class="text-2xl font-extrabold text-slate-50">Quest abgeschlossen</h2>
        <p class="text-sm text-slate-500 mt-1">${m.epoch} · ${state.currentCharacter.name}</p>
      </div>

      <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 mb-6">
        <h3 class="font-bold text-slate-200 mb-4">📊 Deine Bilanz</h3>
        <div class="space-y-3">${statBlock('influence')}${statBlock('suspicion')}</div>
        <p class="mt-4 text-xs text-slate-500">Gesammelte Quellen: ${state.inventory.length ? state.inventory.map(id => findArtifact(id).name).join(' · ') : 'keine'}</p>
      </div>

      <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 mb-6">
        <h3 class="font-bold text-slate-200 mb-3">🗳️ Dein Entscheidungsweg</h3>
        <ul class="space-y-2 text-sm text-slate-400">
          ${state.decisions.length ? state.decisions.map((d, i) => `<li><span class="font-semibold text-slate-300">${i + 1}. ${d.npc}:</span> ${d.choice}</li>`).join('') : '<li class="italic text-slate-600">Keine Dialogentscheidungen getroffen.</li>'}
        </ul>
      </div>

      <div class="bg-slate-800/60 border border-sky-500/30 rounded-2xl p-6 mb-6">
        <h3 class="font-bold text-sky-400 mb-3">🎓 Abitur-Wissen</h3>
        <p class="text-slate-300 leading-relaxed">${ev.summary}</p>
      </div>

      <div class="bg-gradient-to-br from-amber-500/10 to-slate-900 border border-amber-500/40 rounded-2xl p-6 mb-4">
        <h3 class="font-bold text-amber-400 mb-3">📒 Reflexionsaufgabe für die Dalton-Mappe</h3>
        <p class="text-slate-200 leading-relaxed italic mb-5">„${ev.daltonTask}"</p>

        <label class="text-xs text-slate-500 mb-1 block">Dein Name (für das Zertifikat):</label>
        <input id="player-name" type="text" placeholder="z. B. Anna Schülerin"
          class="w-full mb-4 text-sm bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500" />

        <label class="text-xs text-slate-500 mb-1 block">Kopierbarer Mappen-Eintrag:</label>
        <textarea id="dalton-copy" rows="12" class="w-full font-term text-xs bg-slate-950 border border-slate-700 rounded-lg p-4 text-slate-200 leading-relaxed focus:outline-none focus:ring-2 focus:ring-amber-500">${copyText}</textarea>

        <div class="mt-3 flex flex-wrap gap-2">
          <button onclick="copyDalton()" id="copy-btn" class="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-600 text-sm font-medium transition-all">📋 In die Zwischenablage kopieren</button>
          <button onclick="downloadCertificate()" id="cert-btn" class="px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-slate-950 text-sm font-bold transition-all">📜 Dalton-Mappen-Zertifikat generieren (.txt)</button>

      <div class="flex flex-col sm:flex-row gap-3 justify-center mt-8">

        <button onclick="goHome()" class="px-6 py-3 rounded-xl bg-amber-600 hover:bg-amber-500 text-slate-950 font-bold transition-all hover:-translate-y-0.5">🏛️ Andere Welt / Hauptmenü</button>

   GAME OVER (Verdacht >= 80)
   ========================================================================= */

  const m = mod();
  state.phase = 'gameover';
  document.getElementById('game').classList.add('hidden');
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');

  ov.innerHTML = `
    <div class="fade-in max-w-3xl mx-auto">
      <div class="text-center mb-8">
        <div class="text-5xl mb-3">⛓️</div>
        <h2 class="text-2xl font-extrabold text-rose-400">Game Over – Enttarnt</h2>
        <p class="text-sm text-slate-500 mt-1">${m.epoch} · ${state.currentCharacter.name}</p>
      </div>

      <div class="bg-rose-950/30 border border-rose-500/50 rounded-2xl p-6 mb-6 crisis-box">
        <h3 class="font-bold text-rose-300 mb-2">Das Risiko der Staatsgewalt war zu groß (${m.statLabels.suspicion} = ${state.stats.suspicion}%).</h3>
        <p class="text-slate-300 leading-relaxed">Die Häscher der herrschenden Macht nehmen dich noch in derselben Nacht fest. Ohne fairen Prozess verschwindest du in Haft. Dein politisches Projekt endet abrupt – ein historisches Scheitern, das zeigt, wie real und tödlich die Gefahr für die Akteure dieser Epoche war.</p>
      </div>

      <div class="bg-slate-800/60 border border-sky-500/30 rounded-2xl p-6 mb-6">
        <h3 class="font-bold text-sky-400 mb-3">🎓 Epochen-Reflexion</h3>
        <p class="text-slate-300 leading-relaxed">${m.abiEvaluation.summary}</p>
        <p class="mt-4 text-slate-400 text-sm italic">Überlege: An welcher Stelle hättest du das Risiko senken können, ohne deine politischen Ziele aufzugeben? Genau dieses Abwägen zwischen Wirkung (Einfluss) und Risiko (Verdacht) mussten die historischen Akteure permanent leisten.</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 justify-center mt-8">
        <button onclick="selectRole(${state.activeModuleIndex}, '${state.currentCharacter.id}')" class="px-6 py-3 rounded-xl bg-amber-600 hover:bg-amber-500 text-slate-950 font-bold transition-all hover:-translate-y-0.5">🔁 Erneut versuchen</button>
        <button onclick="goHome()" class="px-6 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 font-medium transition-all">🏛️ Hauptmenü</button>
      </div>
    </div>`;
  save();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =========================================================================
   ZWISCHENABLAGE
   ========================================================================= */
function copyDalton() {
  const ta = document.getElementById('dalton-copy');
  const btn = document.getElementById('copy-btn');
  const done = () => { btn.textContent = '✅ Kopiert!'; setTimeout(() => btn.textContent = '📋 In die Zwischenablage kopieren', 1800); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done).catch(() => { ta.select(); document.execCommand('copy'); done(); });
  } else { ta.select(); document.execCommand('copy'); done(); }
}

/* =========================================================================
   ZERTIFIKAT-DOWNLOAD (.txt via Blob)
   ========================================================================= */
function downloadCertificate() {
  const m = mod();
  const ev = m.abiEvaluation;
  const nameInput = document.getElementById('player-name');
  const name = (nameInput && nameInput.value.trim()) ? nameInput.value.trim() : 'Schüler/in';
  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { year: 'numeric', month: 'long', day: 'numeric' });
  const line = '═'.repeat(64);

  const decisions = state.decisions.length
    ? state.decisions.map((d, i) => `  ${i + 1}. [${d.location.replace('📍 ', '')}] ${d.npc}\n     → ${d.choice}`).join('\n\n')
    : '  (keine Entscheidungen protokolliert)';
  const arts = state.inventory.length
    ? state.inventory.map(id => '  • ' + findArtifact(id).name).join('\n')
    : '  (keine)';

  const text =
`${line}
   DALTON-MAPPEN-ZERTIFIKAT  ·  GESCHICHTS-RPG (Chronik-Engine)
${line}

  Name:     ${name}
  Rolle:    ${state.currentCharacter.name}
  Epoche:   ${m.epoch}
  Datum:    ${dateStr}

${line}
  1) GETROFFENE ENTSCHEIDUNGEN (SPIELVERLAUF)
${line}
${decisions}

${line}
  2) GESAMMELTE QUELLEN-ARTEFAKTE
${line}
${arts}

${line}
  3) FINALE STATISTIK
${line}
  ${m.statLabels.influence}: ${state.stats.influence}%
  ${m.statLabels.suspicion}: ${state.stats.suspicion}%

${line}
  4) OFFIZIELLES ABITUR-WISSEN
${line}
${ev.summary}

${line}
  5) REFLEXIONSAUFGABE FÜR DIE DALTON-MAPPE
${line}
${ev.daltonTask}

${line}
  Erstellt mit der Chronik-Engine · Dalton-Plan · ${dateStr}
${line}
`;

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Dalton-Zertifikat_${m.module_id}_${state.currentCharacter.id}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const btn = document.getElementById('cert-btn');
  if (btn) { btn.textContent = '✅ Zertifikat heruntergeladen'; setTimeout(() => btn.textContent = '📜 Dalton-Mappen-Zertifikat generieren (.txt)', 2200); }
}

/* =========================================================================
   ZURÜCK / RESET
   ========================================================================= */
function goHome() {
  clearSave();
  state.activeModuleIndex = null;
  state.currentCharacter = null;
  state.currentLocation = "start";
  state.inventory = [];
  state.stats = { influence: 50, suspicion: 10 };
  state.log = [];
  state.decisions = [];
  state.dialogNpcIndex = null;
  state.gameOver = false;
  state.phase = 'menu';
  renderMenu();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =========================================================================
   INIT
   ========================================================================= */
renderMenu();
</script>
